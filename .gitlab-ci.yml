variables:
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_FETCH_EXTRA_FLAGS: --tags
  GIT_DEPTH: none

image:
  name: registry.gitlab.com/wanted-project/wanted-engine/build
  entrypoint: [""]

stages:
  - build
  - test


.build_job_template: &build_defs  # Hidden yaml configuration that defines an anchor named 'job_configuration'
  stage: build
  artifacts:
    paths:
    - $BUILD_DIR
    - wasm/supervisor
    expire_in: 20 minutes
  script:
    - echo -n "Building version:"
    - git describe --tags --abbrev=0
    - mkdir -p "$BUILD_DIR"
    - cd "$BUILD_DIR"
    - cmake -GNinja $CMAKE_EXTRA_ARGS ..
    - ninja
    - ninja supervisor

.unit_test_job_template: &unit_defs
  stage: test
  script:
    - cd "$BUILD_DIR"
    - ctest --output-junit rspec.xml
  artifacts:
    when: always
    paths:
      - "$BUILD_DIR/rspec.xml"
      - "$BUILD_DIR/Testing/Temporary/LastTest.log"
    reports:
      junit: "$BUILD_DIR/rspec.xml"

# Smoke jobs run the engine end-to-end against a built CLI. They assume the
# repo CWD is the project root: the compiled-in supervisor image path
# (./wasm/supervisor/<variant>/supervisor.tar) resolves relative to it, and
# wasm/supervisor is carried over from the build job's artifacts.
.smoke_job_template: &smoke_defs
  stage: test


build-gcc:
  <<: *build_defs
  variables:
    BUILD_DIR: build-gcc
    CC: gcc

build-clang:
  <<: *build_defs
  variables:
    BUILD_DIR: build-clang
    CC: clang

build-coverage:
  <<: *build_defs
  variables:
    BUILD_DIR: build
    CC: gcc
    CMAKE_EXTRA_ARGS: -DENABLE_CODE_COVERAGE=on

# wsh debug-supervisor build: drives the interactive VFS/control-plane and
# multi-wapp smoke tests, which need the wsh shell compiled in as the boot wapp.
build-wsh:
  <<: *build_defs
  variables:
    BUILD_DIR: build-wsh
    CC: gcc
    CMAKE_EXTRA_ARGS: -DWANTED_SUPERVISOR_IMAGE_PATH=./wasm/supervisor/wsh/supervisor.tar

unit-test-gcc:
  <<: *unit_defs
  dependencies:
    - build-gcc
  variables:
    BUILD_DIR: build-gcc

unit-test-clang:
  <<: *unit_defs
  dependencies:
    - build-clang
  variables:
    BUILD_DIR: build-clang

coverage:
  stage: test
  dependencies:
    - build-coverage
  variables:
    BUILD_DIR: build
  script:
    - cd "$BUILD_DIR"
    - ninja coverage
  coverage: '/lines: \d+\.\d+/'
  artifacts:
    name: ${CI_JOB_NAME}-${CI_COMMIT_REF_NAME}-${CI_COMMIT_SHA}
    paths:
      - "$BUILD_DIR/coverage.xml"
    reports:
      coverage_report:
        coverage_format: cobertura
        path: "$BUILD_DIR/coverage.xml"

# Boot the production (sheriff) supervisor and assert it instantiates without
# crashing. Runs against the default build, which embeds the sheriff image.
smoke-engine:
  <<: *smoke_defs
  dependencies:
    - build-gcc
  variables:
    BUILD_DIR: build-gcc
  script:
    - ./test/smoke-engine.sh ./$BUILD_DIR/cmd/wanted-cli ./test/smoke-engine-config.json

# Drive the wsh shell to exercise VFS namespaces and the control plane.
smoke-vfs:
  <<: *smoke_defs
  dependencies:
    - build-wsh
  variables:
    BUILD_DIR: build-wsh
  script:
    - ./test/smoke.sh ./$BUILD_DIR/cmd/wanted-cli ./docs/example_config_smoke.json

# Drive the wsh shell to launch a second wapp and assert both run concurrently.
smoke-multiwapp:
  <<: *smoke_defs
  dependencies:
    - build-wsh
  variables:
    BUILD_DIR: build-wsh
  script:
    - ./test/smoke-multiwapp.sh ./$BUILD_DIR/cmd/wanted-cli ./docs/example_config_smoke.json