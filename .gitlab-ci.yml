variables:
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_FETCH_EXTRA_FLAGS: --tags
  GIT_DEPTH: none
  # The NuttX + apps submodules are large and only the sim job needs them, so
  # exclude them from the default recursive fetch and let that job init them
  # shallow. Other jobs still get the vendored submodules (wamr, etc.).
  GIT_SUBMODULE_PATHS: ':(exclude)third_party/nuttx :(exclude)third_party/nuttx-apps'
  # ccache persists across pipelines via the per-job cache below. The build
  # image routes every compile through ccache via the /usr/lib/ccache masquerade.
  CCACHE_DIR: $CI_PROJECT_DIR/.ccache
  CCACHE_BASEDIR: $CI_PROJECT_DIR
  CCACHE_MAXSIZE: "500M"

image:
  name: registry.gitlab.com/wanted-project/wanted-engine/build
  entrypoint: [""]

stages:
  - build
  - test
  - integration-tests


# Per-job ccache, reused by that job across pipelines. Caches are NOT shared
# between jobs on purpose: ccache keys on the compiler and flags, so gcc/clang/
# coverage entries are mutually incompatible, and parallel build jobs sharing
# one key would only race to overwrite it. The masquerade (image PATH) is what
# routes both the cmake builds and the NuttX kbuild through ccache.
.ccache_cache: &ccache_cache
  key: "ccache-$CI_JOB_NAME"
  paths:
    - .ccache

# NuttX fork checkout, cached across pipelines so build-nuttx need not re-fetch
# the (large) nuttx{,-apps} submodules each run. Bump the key version when the
# pin moves — a stale cached tree would otherwise hide the new commit (deps()
# reuses an already-checked-out tree as-is).
.nuttx_tree_cache: &nuttx_tree_cache
  key: nuttx-tree-v1
  paths:
    - third_party/nuttx
    - third_party/nuttx-apps

.build_job_template: &build_defs  # Hidden yaml configuration that defines an anchor named 'job_configuration'
  stage: build
  cache:
    *ccache_cache
  artifacts:
    paths:
    - $BUILD_DIR
    - wasm/supervisor
    expire_in: 20 minutes
  script:
    - echo -n "Building version:"
    - git describe --tags --abbrev=0
    - mkdir -p "$BUILD_DIR"
    - cd "$BUILD_DIR"
    - cmake -GNinja $CMAKE_EXTRA_ARGS ..
    - ninja
    - ninja supervisor

.unit_test_job_template: &unit_defs
  stage: test
  script:
    - cd "$BUILD_DIR"
    - ctest -j"$(nproc)" --output-junit rspec.xml
  artifacts:
    when: always
    paths:
      - "$BUILD_DIR/rspec.xml"
      - "$BUILD_DIR/Testing/Temporary/LastTest.log"
    reports:
      junit: "$BUILD_DIR/rspec.xml"

# build-nuttx shallow-inits the third_party/nuttx{,-apps} forks (excluded from
# the global fetch above; cached across pipelines) and builds the engine as a
# NuttX built-in over hostfs. The build image carries the sim prerequisites.
build-nuttx:
  stage: build
  cache:
    - *ccache_cache
    - *nuttx_tree_cache
  artifacts:
    paths:
      - third_party/nuttx/nuttx
    expire_in: 20 minutes
  script:
    - bash test/nuttx-sim.sh kernel
  
build-gcc:
  <<: *build_defs
  variables:
    BUILD_DIR: build-gcc
    CC: gcc

build-clang:
  <<: *build_defs
  variables:
    BUILD_DIR: build-clang
    CC: clang

build-coverage:
  <<: *build_defs
  variables:
    BUILD_DIR: build
    CC: gcc
    CMAKE_EXTRA_ARGS: -DENABLE_CODE_COVERAGE=on

# Build-validation for the alternate supervisor-image cmake option
# (-DWANTED_SUPERVISOR_IMAGE_PATH). The smoke tests select the wsh image at
# runtime via config, so they don't depend on this job — it only asserts the
# wsh-compiled-in build still links.
build-wsh:
  <<: *build_defs
  needs:
    - build-gcc
  cache:
    # Reuse build-gcc's warm cache: same gcc + flags, and the wsh image define
    # only changes one object, so ~99% of compiles hit. pull-only so this build
    # does not write back into build-gcc's cache.
    key: ccache-build-gcc
    paths:
      - .ccache
    policy: pull
  variables:
    BUILD_DIR: build-wsh
    CC: gcc
    CMAKE_EXTRA_ARGS: -DWANTED_SUPERVISOR_IMAGE_PATH=./wasm/supervisor/wsh/supervisor.tar

unit-test-gcc:
  <<: *unit_defs
  needs:
    - build-gcc
  variables:
    BUILD_DIR: build-gcc

unit-test-clang:
  <<: *unit_defs
  needs:
    - build-clang
  variables:
    BUILD_DIR: build-clang

coverage:
  stage: test
  needs:
    - build-coverage
  variables:
    BUILD_DIR: build
  script:
    - cd "$BUILD_DIR"
    - ninja coverage
  coverage: '/lines: \d+\.\d+/'
  artifacts:
    name: ${CI_JOB_NAME}-${CI_COMMIT_REF_NAME}-${CI_COMMIT_SHA}
    paths:
      - "$BUILD_DIR/coverage.xml"
    reports:
      coverage_report:
        coverage_format: cobertura
        path: "$BUILD_DIR/coverage.xml"

# End-to-end engine tests. The in-WASM selftest suite (test/selftest.sh) is the
# canonical functional suite — it boots the selftest supervisor and asserts the
# VFS/control-plane/sandbox/robustness behaviour from inside WASM, identically on
# Linux and the nuttx sim. smoke-engine.sh covers what selftest does not: that the
# production (sheriff) supervisor image instantiates cleanly. syscontrol.sh
# covers the engine-process lifecycle the in-WASM suite cannot observe —
# poweroff/reboot/exit and that a respawned supervisor keeps a working console.
# The CLI and supervisor TARs come from build-gcc (`ninja supervisor`). Scripts
# assume the repo CWD is the project root, which is the CI default.
integration-tests:
  stage: integration-tests
  needs:
    - build-gcc
  variables:
    BUILD_DIR: build-gcc
  script:
    - |
      status=0
      for s in test/smoke*.sh; do
        echo "========== $s =========="
        if bash "$s" "./$BUILD_DIR/cmd/wanted-cli"; then
          echo "PASS: $s"
        else
          echo "FAIL: $s"
          status=1
        fi
      done
      echo "========== test/selftest.sh =========="
      if bash test/selftest.sh "./$BUILD_DIR/cmd/wanted-cli"; then
        echo "PASS: test/selftest.sh"
      else
        echo "FAIL: test/selftest.sh"
        status=1
      fi
      echo "========== test/syscontrol.sh =========="
      if bash test/syscontrol.sh "./$BUILD_DIR/cmd/wanted-cli"; then
        echo "PASS: test/syscontrol.sh"
      else
        echo "FAIL: test/syscontrol.sh"
        status=1
      fi
      exit $status

# Boots the sim and runs the in-WASM selftest suite asserts VFS / control
# plane / sandbox / robustness from inside WASM, identically to Linux. Needs
# build-gcc for the supervisor TARs (wasm/supervisor, from `ninja supervisor`).
nuttx-selftest:
  stage: integration-tests
  needs:
    - build-nuttx
    - build-gcc
  variables:
    NUTTX_SKIP_BUILD: "1"
  script:
    - bash test/nuttx-sim.sh selftest

# Run-only: the engine-process lifecycle the in-WASM suite cannot observe —
# poweroff / reboot / exit and that a respawned supervisor keeps a working
# console.
nuttx-syscontrol:
  stage: integration-tests
  needs:
    - build-nuttx
    - build-gcc
  variables:
    NUTTX_SKIP_BUILD: "1"
  script:
    - bash test/nuttx-sim.sh syscontrol
