variables:
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_FETCH_EXTRA_FLAGS: --tags
  GIT_DEPTH: none
  # The NuttX + apps submodules are large and only the sim job needs them, so
  # exclude them from the default recursive fetch and let that job init them
  # shallow. Other jobs still get the vendored submodules (wamr, etc.).
  GIT_SUBMODULE_PATHS: ':(exclude)third_party/nuttx :(exclude)third_party/nuttx-apps'
  # ccache persists across pipelines via the per-job cache below. The build
  # image routes every compile through ccache via the /usr/lib/ccache masquerade.
  CCACHE_DIR: $CI_PROJECT_DIR/.ccache
  CCACHE_BASEDIR: $CI_PROJECT_DIR
  CCACHE_MAXSIZE: "500M"

# Retry on transient runner infrastructure failures (e.g. DNS flakiness when
# pulling the build image). runner_system_failure covers the "connection refused
# on [::1]:53" DNS errors seen on ganymede1.
default:
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

image:
  name: registry.gitlab.com/mekops/wanted/wanted-engine/build:0.7.0
  entrypoint: [""]

stages:
  - lint
  - build
  - static
  - test
  - integration-tests
  - security


# Per-job ccache, reused by that job across pipelines. Caches are NOT shared
# between jobs on purpose: ccache keys on the compiler and flags, so gcc/clang/
# coverage entries are mutually incompatible, and parallel build jobs sharing
# one key would only race to overwrite it. The masquerade (image PATH) is what
# routes both the cmake builds and the NuttX kbuild through ccache.
.ccache_cache: &ccache_cache
  key: "ccache-$CI_JOB_NAME"
  paths:
    - .ccache

.build_job_template: &build_defs  # Hidden yaml configuration that defines an anchor named 'job_configuration'
  stage: build
  cache:
    *ccache_cache
  artifacts:
    paths:
    - $BUILD_DIR
    expire_in: 20 minutes
  script:
    - just build

.unit_test_job_template: &unit_defs
  stage: test
  script:
    - just test
  artifacts:
    when: always
    paths:
      - "$BUILD_DIR/rspec.xml"
      - "$BUILD_DIR/Testing/Temporary/LastTest.log"
    reports:
      junit: "$BUILD_DIR/rspec.xml"

# build-nuttx shallow-inits the third_party/nuttx{,-apps} forks (excluded from
# the global fetch above; cached across pipelines) and builds the engine as a
# NuttX built-in over hostfs. The build image carries the sim prerequisites.
build-nuttx:
  stage: build
  # Force a clean clone. This job was seen running against a stale tree left in
  # the runner's reused build dir (an empty get_sources step — no fetch/checkout
  # logged), which then runs an outdated Justfile and fails to find the recipe.
  # A fresh clone guarantees the working tree matches the commit under test.
  variables:
    GIT_STRATEGY: clone
  cache:
    - *ccache_cache
  artifacts:
    paths:
      - third_party/nuttx/nuttx
    expire_in: 20 minutes
  script:
    - just nuttx-kernel

build-gcc:
  <<: *build_defs
  variables:
    BUILD_DIR: build-gcc
    CC: gcc

build-clang:
  <<: *build_defs
  variables:
    BUILD_DIR: build-clang
    CC: clang

# Build-validation for the alternate supervisor-image cmake option
# (-DWANTED_SUPERVISOR_IMAGE_PATH). The smoke tests select the wsh image at
# runtime via config, so they don't depend on this job — it only asserts the
# wsh-compiled-in build still links.
build-wsh:
  <<: *build_defs
  needs:
    - build-gcc
  cache:
    # Reuse build-gcc's warm cache: same gcc + flags, and the wsh image define
    # only changes one object, so ~99% of compiles hit. pull-only so this build
    # does not write back into build-gcc's cache.
    key: ccache-build-gcc
    paths:
      - .ccache
    policy: pull
  variables:
    BUILD_DIR: build-wsh
    CC: gcc
    CMAKE_EXTRA_ARGS: -DWANTED_SUPERVISOR_IMAGE_PATH=./wasm/supervisor/wsh/supervisor.tar

unit-test-gcc:
  <<: *unit_defs
  needs:
    - build-gcc
  variables:
    BUILD_DIR: build-gcc

unit-test-clang:
  <<: *unit_defs
  needs:
    - build-clang
  variables:
    BUILD_DIR: build-clang

# Validates the out-of-tree driver seam: builds against the fixture tree in
# test/extra-drivers and asserts an extra driver resolves while one claiming a
# core name still loses to core. Configures its own build dir, so it consumes
# no build artifact.
extra-drivers:
  stage: test
  cache:
    *ccache_cache
  variables:
    CC: gcc
  script:
    - just test-extra-drivers

coverage:
  stage: test
  variables:
    BUILD_DIR: build
    CC: gcc
    CMAKE_EXTRA_ARGS: -DENABLE_CODE_COVERAGE=on
  script:
    - just build
    - just coverage
  coverage: '/lines: \d+\.\d+/'
  artifacts:
    name: ${CI_JOB_NAME}-${CI_COMMIT_REF_NAME}-${CI_COMMIT_SHA}
    paths:
      - "$BUILD_DIR/coverage.xml"
    reports:
      coverage_report:
        coverage_format: cobertura
        path: "$BUILD_DIR/coverage.xml"

# End-to-end engine tests. The in-WASM selftest suite (test/selftest.sh) is the
# canonical functional suite — it boots the selftest supervisor and asserts the
# VFS/control-plane/sandbox/robustness behaviour from inside WASM, identically on
# Linux and the nuttx sim. smoke-engine.sh covers what selftest does not: that the
# production (sheriff) supervisor image instantiates cleanly. syscontrol.sh
# covers the engine-process lifecycle the in-WASM suite cannot observe —
# poweroff/reboot/exit and that a respawned supervisor keeps a working console.
# The CLI comes from build-gcc, the supervisor TARs + test wapps from build-wasm.
# Scripts assume the repo CWD is the project root, which is the CI default.

# Every wasm artifact is built here, in the wapp-sdk image — the only image with
# a wasm toolchain (wasi-sdk for the C wapps, Zig for sheriff). The engine build
# image carries none, so the jobs below consume these artifacts instead of
# compiling wasm themselves (WAPPS_PREBUILT=1). sheriff's submodule uses a
# relative URL, which resolves to HTTPS + the job token in CI (SSH locally), so
# the recursive fetch needs no key.
build-wasm:
  stage: build
  image:
    name: registry.gitlab.com/mekops/wanted/wanted-engine/wapp-sdk:0.1.1
    entrypoint: [""]
  variables:
    ZIG_GLOBAL_CACHE_DIR: $CI_PROJECT_DIR/.zig-cache
  cache:
    key: zig-sheriff
    paths:
      - .zig-cache
  # The wapp-sdk image has make but no just, so drive the Makefiles directly
  # (same targets the `wasm` / `sheriff` just recipes wrap).
  script:
    - make -C wasm/supervisor
    - make -C wapps
    - make -C wasm/supervisor sheriff
  artifacts:
    paths:
      - wasm/supervisor
      - wapps
    expire_in: 20 minutes

integration-tests:
  stage: integration-tests
  needs:
    - build-gcc
    - build-wasm
  variables:
    BUILD_DIR: build-gcc
    WAPPS_PREBUILT: "1"
  script:
    - just smoke-engine
    - just selftest
    - just syscontrol
    # Builds its own wsh engine (the supervisor image is compiled in), so it
    # does not use BUILD_DIR above.
    - just live-update

# The same in-WASM suite against a cross-built engine under qemu user-mode
# emulation. Engine faults that depend on the target's calling convention,
# alignment, or signal handling do not reproduce on x86 — this is the lane that
# catches them without router hardware. Cross-builds in-job from the OpenWRT SDK
# (cached under .openwrt-sdk/), so it needs no engine artifact.
selftest-qemu:
  stage: integration-tests
  needs:
    - build-wasm
  variables:
    WAPPS_PREBUILT: "1"
  parallel:
    matrix:
      - ARCH: [aarch64, mipsel]
  script:
    - just selftest-qemu-$ARCH

# Boots the sim and runs the in-WASM selftest suite asserts VFS / control
# plane / sandbox / robustness from inside WASM, identically to Linux. Needs
# build-gcc for the engine and build-wasm for the supervisor TARs + test wapps.
nuttx-selftest:
  stage: integration-tests
  needs:
    - build-nuttx
    - build-gcc
    - build-wasm
  variables:
    NUTTX_SKIP_BUILD: "1"
    WAPPS_PREBUILT: "1"
  script:
    - just nuttx-selftest

# the engine-process lifecycle the in-WASM suite cannot observe —
# poweroff / reboot / exit and that a respawned supervisor keeps a working
# console.
nuttx-syscontrol:
  stage: integration-tests
  needs:
    - job: build-nuttx
      artifacts: false
    - build-gcc
    - build-wasm
  variables:
    WAPPS_PREBUILT: "1"
    # Build the sim in-job from a forced clean tree. An incremental NuttX build
    # on a reused runner workspace can run a stale engine ELF (the kbuild does
    # not track the engine objects), which silently tests an old binary and
    # produces poweroff/reboot false negatives. distclean + reconfigure on every
    # run is the only reliable guard against that.
    NUTTX_SKIP_BUILD: "0"
    NUTTX_CLEAN: "1"
  script:
    - just nuttx-syscontrol

# --- lint / static analysis / security -----------------------------------

# Blocking: zero tolerance on style drift. Needs no submodules or build.
format-check:
  stage: lint
  needs: []
  variables:
    GIT_SUBMODULE_STRATEGY: none
  script:
    - just lint-format

# Blocking: rejects shell scripts with error-level shellcheck findings.
shell-check:
  stage: lint
  needs: []
  variables:
    GIT_SUBMODULE_STRATEGY: none
  script:
    - just lint-shell

# clang-tidy reads compile_commands.json from the clang build artifact.
clang-tidy:
  stage: static
  needs:
    - build-clang
  variables:
    TIDY_BUILD_DIR: build-clang
  allow_failure: true
  script:
    - just tidy

# cppcheck parses sources itself, so it needs no build artifact.
cppcheck:
  stage: static
  needs: []
  allow_failure: true
  script:
    - just cppcheck

# Pattern-based C/C++ security scan (semgrep p/c ruleset).
semgrep:
  stage: security
  needs: []
  variables:
    GIT_SUBMODULE_STRATEGY: none
  allow_failure: true
  script:
    - just security

# CVE + secret scan of the build image definition and the working tree.
trivy:
  stage: security
  needs: []
  variables:
    GIT_SUBMODULE_STRATEGY: none
  allow_failure: true
  script:
    - just scan-image
