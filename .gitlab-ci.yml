variables:
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_FETCH_EXTRA_FLAGS: --tags
  GIT_DEPTH: none

image:
  name: registry.gitlab.com/wanted-project/wanted-engine/build
  entrypoint: [""]

stages:
  - build
  - test
  - integration-tests


.build_job_template: &build_defs  # Hidden yaml configuration that defines an anchor named 'job_configuration'
  stage: build
  artifacts:
    paths:
    - $BUILD_DIR
    - wasm/supervisor
    expire_in: 20 minutes
  script:
    - echo -n "Building version:"
    - git describe --tags --abbrev=0
    - mkdir -p "$BUILD_DIR"
    - cd "$BUILD_DIR"
    - cmake -GNinja $CMAKE_EXTRA_ARGS ..
    - ninja
    - ninja supervisor

.unit_test_job_template: &unit_defs
  stage: test
  script:
    - cd "$BUILD_DIR"
    - ctest --output-junit rspec.xml
  artifacts:
    when: always
    paths:
      - "$BUILD_DIR/rspec.xml"
      - "$BUILD_DIR/Testing/Temporary/LastTest.log"
    reports:
      junit: "$BUILD_DIR/rspec.xml"

build-gcc:
  <<: *build_defs
  variables:
    BUILD_DIR: build-gcc
    CC: gcc

build-clang:
  <<: *build_defs
  variables:
    BUILD_DIR: build-clang
    CC: clang

build-coverage:
  <<: *build_defs
  variables:
    BUILD_DIR: build
    CC: gcc
    CMAKE_EXTRA_ARGS: -DENABLE_CODE_COVERAGE=on

# Build-validation for the alternate supervisor-image cmake option
# (-DWANTED_SUPERVISOR_IMAGE_PATH). The smoke tests select the wsh image at
# runtime via config, so they don't depend on this job — it only asserts the
# wsh-compiled-in build still links.
build-wsh:
  <<: *build_defs
  variables:
    BUILD_DIR: build-wsh
    CC: gcc
    CMAKE_EXTRA_ARGS: -DWANTED_SUPERVISOR_IMAGE_PATH=./wasm/supervisor/wsh/supervisor.tar

unit-test-gcc:
  <<: *unit_defs
  dependencies:
    - build-gcc
  variables:
    BUILD_DIR: build-gcc

unit-test-clang:
  <<: *unit_defs
  dependencies:
    - build-clang
  variables:
    BUILD_DIR: build-clang

coverage:
  stage: test
  dependencies:
    - build-coverage
  variables:
    BUILD_DIR: build
  script:
    - cd "$BUILD_DIR"
    - ninja coverage
  coverage: '/lines: \d+\.\d+/'
  artifacts:
    name: ${CI_JOB_NAME}-${CI_COMMIT_REF_NAME}-${CI_COMMIT_SHA}
    paths:
      - "$BUILD_DIR/coverage.xml"
    reports:
      coverage_report:
        coverage_format: cobertura
        path: "$BUILD_DIR/coverage.xml"

# End-to-end smoke tests: run every test/smoke*.sh against the built CLI. Each
# script supplies its own default config (and thus its supervisor image, via
# the runtime supervisor.imagePath override), so the sheriff and wsh variants
# are both exercised off a single build — adding a new test/smoke*.sh needs no
# change here. Both supervisor TAR variants and the CLI come from build-gcc's
# artifacts (`ninja supervisor` builds sheriff + wsh). Scripts assume the repo
# CWD is the project root, which is the CI default.
integration-tests:
  stage: integration-tests
  dependencies:
    - build-gcc
  variables:
    BUILD_DIR: build-gcc
  script:
    - |
      status=0
      for s in test/smoke*.sh; do
        echo "========== $s =========="
        if bash "$s" "./$BUILD_DIR/cmd/wanted-cli"; then
          echo "PASS: $s"
        else
          echo "FAIL: $s"
          status=1
        fi
      done
      exit $status