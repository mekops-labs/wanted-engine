variables:
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_FETCH_EXTRA_FLAGS: --tags
  GIT_DEPTH: none
  GIT_SUBMODULE_PATHS: ':(exclude)third_party/nuttx :(exclude)third_party/nuttx-apps'
  CCACHE_DIR: $CI_PROJECT_DIR/.ccache
  CCACHE_BASEDIR: $CI_PROJECT_DIR
  CCACHE_MAXSIZE: "500M"

default:
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

image:
  name: registry.gitlab.com/mekops/wanted/wanted-engine/build:0.7.1
  entrypoint: [""]

stages:
  - lint
  - build
  - static
  - test
  - integration-tests
  - security

.ccache_cache: &ccache_cache
  key: "ccache-$CI_JOB_NAME"
  paths:
    - .ccache

.build_job_template: &build_defs
  stage: build
  cache:
    *ccache_cache
  artifacts:
    paths:
    - $BUILD_DIR
    expire_in: 20 minutes
  script:
    - just build

.unit_test_job_template: &unit_defs
  stage: test
  script:
    - just test
  artifacts:
    when: always
    paths:
      - "$BUILD_DIR/rspec.xml"
      - "$BUILD_DIR/Testing/Temporary/LastTest.log"
    reports:
      junit: "$BUILD_DIR/rspec.xml"

build-nuttx:
  stage: build
  variables:
    GIT_STRATEGY: clone
  cache:
    - *ccache_cache
  artifacts:
    paths:
      - third_party/nuttx/nuttx
    expire_in: 20 minutes
  script:
    - just nuttx-kernel

build-gcc:
  <<: *build_defs
  variables:
    BUILD_DIR: build-gcc
    CC: gcc

build-clang:
  <<: *build_defs
  variables:
    BUILD_DIR: build-clang
    CC: clang

build-wsh:
  <<: *build_defs
  script:
    - just supervisor-variant wsh
    - just build
  needs:
    - build-gcc
  cache:
    key: ccache-build-gcc
    paths:
      - .ccache
    policy: pull
  variables:
    BUILD_DIR: build-wsh
    CC: gcc

unit-test-gcc:
  <<: *unit_defs
  needs:
    - build-gcc
  variables:
    BUILD_DIR: build-gcc

unit-test-clang:
  <<: *unit_defs
  needs:
    - build-clang
  variables:
    BUILD_DIR: build-clang

extra-drivers:
  stage: test
  cache:
    *ccache_cache
  variables:
    CC: gcc
  script:
    - just test-extra-drivers

coverage:
  stage: test
  variables:
    BUILD_DIR: build
    CC: gcc
  script:
    - just setconfig WANTED_BUILD_COVERAGE=y
    - just build
    - just coverage
  coverage: '/lines: \d+\.\d+/'
  artifacts:
    name: ${CI_JOB_NAME}-${CI_COMMIT_REF_NAME}-${CI_COMMIT_SHA}
    paths:
      - "$BUILD_DIR/coverage.xml"
    reports:
      coverage_report:
        coverage_format: cobertura
        path: "$BUILD_DIR/coverage.xml"

build-wasm:
  stage: build
  image:
    name: registry.gitlab.com/mekops/wanted/wanted-engine/wapp-sdk:0.1.1
    entrypoint: [""]
  variables:
    ZIG_GLOBAL_CACHE_DIR: $CI_PROJECT_DIR/.zig-cache
  cache:
    key: zig-sheriff
    paths:
      - .zig-cache
  script:
    - make -C wasm/supervisor
    - make -C wapps
    - make -C wasm/supervisor sheriff
  artifacts:
    paths:
      - wasm/supervisor
      - wapps
    expire_in: 20 minutes

integration-tests:
  stage: integration-tests
  needs:
    - build-gcc
    - build-wasm
  variables:
    BUILD_DIR: build-gcc
    WAPPS_PREBUILT: "1"
  script:
    - just integration
  artifacts:
    when: always
    paths:
      - "$BUILD_DIR/integration-junit.xml"
    reports:
      junit: "$BUILD_DIR/integration-junit.xml"

selftest-openwrt-qemu:
  stage: integration-tests
  needs:
    - build-wasm
  variables:
    WAPPS_PREBUILT: "1"
  parallel:
    matrix:
      - ARCH: [aarch64, mipsel]
  script:
    - just selftest-openwrt-qemu $ARCH build-openwrt-qemu-$ARCH-junit.xml
  artifacts:
    when: always
    paths:
      - build-openwrt-qemu-$ARCH-junit.xml
    reports:
      junit: build-openwrt-qemu-$ARCH-junit.xml

nuttx-selftest:
  stage: integration-tests
  needs:
    - build-nuttx
    - build-gcc
    - build-wasm
  variables:
    NUTTX_SKIP_BUILD: "1"
    WAPPS_PREBUILT: "1"
  script:
    - just nuttx-selftest
  artifacts:
    when: always
    paths:
      - build-nuttx/selftest-junit.xml
    reports:
      junit: build-nuttx/selftest-junit.xml

nuttx-syscontrol:
  stage: integration-tests
  needs:
    - job: build-nuttx
      artifacts: false
    - build-gcc
    - build-wasm
  variables:
    WAPPS_PREBUILT: "1"
    NUTTX_SKIP_BUILD: "0"
    NUTTX_CLEAN: "1"
  script:
    - just nuttx-syscontrol
  artifacts:
    when: always
    paths:
      - build-nuttx/syscontrol-junit.xml
    reports:
      junit: build-nuttx/syscontrol-junit.xml

# --- lint / static analysis / security -----------------------------------

# Blocking: zero tolerance on style drift
format-check:
  stage: lint
  needs: []
  variables:
    GIT_SUBMODULE_STRATEGY: none
  script:
    - just lint-format

# Blocking: rejects shell scripts with error-level shellcheck findings
shell-check:
  stage: lint
  needs: []
  variables:
    GIT_SUBMODULE_STRATEGY: none
  script:
    - just lint-shell

# clang-tidy reads compile_commands.json from the clang build artifact.
# Blocking: zero non-suppressed findings in first-party code
clang-tidy:
  stage: static
  needs:
    - build-clang
  variables:
    TIDY_BUILD_DIR: build-clang
  script:
    - just tidy

# Blocking: zero findings
cppcheck:
  stage: static
  needs: []
  script:
    - just cppcheck

# Blocking: zero findings
semgrep:
  stage: security
  needs: []
  variables:
    GIT_SUBMODULE_STRATEGY: none
  script:
    - just semgrep

# CVE + secret scan of the build image definition and the working tree.
# Blocking: see .trivyignore for the one suppressed finding.
trivy:
  stage: security
  needs: []
  variables:
    GIT_SUBMODULE_STRATEGY: none
  script:
    - just scan-image
